services:
  postgres:
    image: postgres:15-alpine
    container_name: voucher-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS="--locale=en_US.utf8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - internal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres -c 'listen_addresses=*'
  redis:
    image: redis:7-alpine
    container_name: voucher-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - internal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  api:
    build:
      context: ./ 
      dockerfile: Dockerfile
    container_name: voucher-api
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - api-logs:/app/logs
      - api-uploads:/app/uploads
    networks:
      - internal-network
      - public-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: voucher-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - public-network
    depends_on:
      api:
        condition: service_healthy

networks:
  internal-network:
    driver: bridge
    internal: true
  public-network:
    driver: bridge

volumes:
  postgres-data:
    name: ${PROJECT_NAME:-voucher}-postgres-data
  redis-data:
    name: ${PROJECT_NAME:-voucher}-redis-data
  api-logs:
    name: ${PROJECT_NAME:-voucher}-api-logs
  api-uploads:
    name: ${PROJECT_NAME:-voucher}-api-uploads