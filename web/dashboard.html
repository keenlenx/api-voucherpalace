<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>VoucherFlow · Voucher Management</title>
  
  <!-- Font Awesome (only external dependency) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --success: #10b981;
      --success-dark: #059669;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --warning: #f59e0b;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    body {
      background: var(--gray-100);
      min-height: 100vh;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Mobile-First Header */
    .header {
      background: white;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: var(--shadow-sm);
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--gray-600);
      cursor: pointer;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
    }

    .menu-btn:hover {
      background: var(--gray-100);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo i {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .logo span {
      font-weight: 600;
      font-size: 1.125rem;
      color: var(--gray-900);
    }

    .user-avatar {
      width: 2.5rem;
      height: 2.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    /* Sidebar Drawer */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
      display: none;
      backdrop-filter: blur(4px);
    }

    .sidebar-overlay.active {
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: white;
      z-index: 100;
      transition: left 0.3s ease;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-logo i {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .sidebar-logo span {
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--gray-900);
    }

    .close-btn {
      background: var(--gray-100);
      border: none;
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gray-600);
    }

    .user-profile {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--gray-200);
      background: var(--gray-50);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar-large {
      width: 3rem;
      height: 3rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .user-details {
      flex: 1;
    }

    .user-name {
      font-weight: 600;
      color: var(--gray-900);
    }

    .user-email {
      font-size: 0.75rem;
      color: var(--gray-500);
    }

    .nav-menu {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.875rem 1rem;
      border: none;
      background: none;
      color: var(--gray-600);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
      transition: all 0.2s;
      text-align: left;
    }

    .nav-item i {
      width: 1.5rem;
      margin-right: 0.75rem;
      font-size: 1.125rem;
    }

    .nav-item:hover {
      background: var(--gray-100);
      color: var(--gray-900);
    }

    .nav-item.active {
      background: var(--primary);
      color: white;
    }

    .nav-divider {
      height: 1px;
      background: var(--gray-200);
      margin: 1rem 0;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      width: calc(100% - 2rem);
      margin: 1rem;
      padding: 0.875rem 1rem;
      border: none;
      background: var(--danger);
      color: white;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: var(--danger-dark);
    }

    .logout-btn i {
      width: 1.5rem;
      margin-right: 0.75rem;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 1rem;
    }

    /* Desktop Styles */
    @media (min-width: 1024px) {
      .app {
        flex-direction: row;
      }

      .header {
        display: none;
      }

      .sidebar {
        position: static;
        left: 0;
        width: 280px;
        height: 100vh;
      }

      .main {
        flex: 1;
        padding: 1.5rem;
        overflow-y: auto;
        max-height: 100vh;
      }

      .sidebar-overlay {
        display: none !important;
      }
    }

    /* ===== CARDS ===== */
    .card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      margin-bottom: 1rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--gray-900);
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    @media (min-width: 640px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .stat-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1rem;
      border: 1px solid var(--gray-200);
    }

    .stat-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .stat-icon.blue { background: #dbeafe; color: var(--primary); }
    .stat-icon.green { background: #dcfce7; color: var(--success); }
    .stat-icon.purple { background: #f3e8ff; color: #9333ea; }
    .stat-icon.yellow { background: #fef3c7; color: var(--warning); }

    .stat-label {
      font-size: 0.75rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.2;
    }

    /* ===== ACTION GRID ===== */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    @media (min-width: 640px) {
      .action-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .action-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1rem 0.5rem;
      text-align: center;
      border: 1px solid var(--gray-200);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .action-card i {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .action-card span {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-700);
    }

    .action-card.issue i { color: var(--primary); }
    .action-card.redeem i { color: var(--success); }
    .action-card.vouchers i { color: #9333ea; }
    .action-card.templates i { color: var(--warning); }
    .action-card.history i { color: var(--gray-600); }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 0.25rem;
    }

    .form-label i {
      color: var(--gray-400);
      margin-right: 0.25rem;
    }

    .required {
      color: var(--danger);
      margin-left: 0.25rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: all 0.2s;
      background: white;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input:read-only {
      background: var(--gray-50);
      cursor: not-allowed;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
    }

    .input-group .form-input {
      flex: 1;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 500;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 2.75rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: var(--success-dark);
    }

    .btn-outline {
      background: white;
      border: 1px solid var(--gray-300);
      color: var(--gray-700);
    }

    .btn-outline:hover {
      background: var(--gray-50);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-dark);
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      min-height: 2.25rem;
    }

    .btn-block {
      width: 100%;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== SEARCH ===== */
    .search-section {
      background: var(--gray-50);
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      max-height: 200px;
      overflow-y: auto;
      z-index: 50;
      display: none;
      box-shadow: var(--shadow-lg);
    }

    .search-results.show {
      display: block;
    }

    .search-item {
      padding: 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
    }

    .search-item:hover {
      background: var(--gray-50);
    }

    .search-item:last-child {
      border-bottom: none;
    }

    /* ===== SELECTED USER CARD ===== */
    .selected-card {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .selected-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .selected-avatar {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    .selected-details {
      font-weight: 500;
      color: var(--gray-900);
    }

    .selected-sub {
      font-size: 0.875rem;
      color: var(--gray-500);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.5rem;
    }

    /* ===== TABLES & LISTS ===== */
    .list-item {
      padding: 1rem;
      border-bottom: 1px solid var(--gray-200);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .list-title {
      font-weight: 600;
      color: var(--gray-900);
    }

    .list-sub {
      font-size: 0.875rem;
      color: var(--gray-500);
    }

    .list-meta {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-top: 0.25rem;
    }

    /* ===== STATUS BADGES ===== */
    .badge {
      display: inline-flex;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-success {
      background: #dcfce7;
      color: #166534;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-info {
      background: #dbeafe;
      color: #1e40af;
    }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .filter-bar .form-input,
    .filter-bar .form-select {
      width: auto;
      min-width: 150px;
    }

    @media (max-width: 640px) {
      .filter-bar .form-input,
      .filter-bar .form-select {
        width: 100%;
      }
    }

    /* ===== UPLOAD AREA ===== */
    .upload-area {
      border: 2px dashed var(--gray-300);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      background: var(--gray-50);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .upload-area i {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-top: 0.25rem;
    }

    /* ===== PREVIEW CARD ===== */
    .preview-card {
      background: var(--gray-50);
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-top: 1rem;
    }

    .preview-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    /* ===== RESULT SUMMARY ===== */
    .result-summary {
      padding: 1rem;
      border-radius: var(--radius-lg);
      margin-top: 1rem;
    }

    .result-summary.success {
      background: #dcfce7;
      color: #166534;
    }

    .result-summary.warning {
      background: #fef3c7;
      color: #92400e;
    }

    .result-summary.error {
      background: #fee2e2;
      color: #991b1b;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      left: 1rem;
      background: var(--gray-900);
      color: white;
      padding: 1rem;
      border-radius: var(--radius-lg);
      display: none;
      z-index: 1000;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    @media (min-width: 640px) {
      .toast {
        left: auto;
        width: 320px;
      }
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* ===== SECTIONS ===== */
    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* ===== UTILITIES ===== */
    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    .mt-2 {
      margin-top: 0.5rem;
    }

    .mb-2 {
      margin-bottom: 0.5rem;
    }

    .gap-2 {
      gap: 0.5rem;
    }

    .flex {
      display: flex;
    }

    .items-center {
      align-items: center;
    }

    .justify-between {
      justify-content: space-between;
    }

    .w-full {
      width: 100%;
    }
    .mobile-user-dropdown {
  position: relative;
}

.mobile-dropdown-menu {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 0.5rem;
  background: white;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 50;
  display: none;
  border: 1px solid var(--gray-200);
}

.mobile-dropdown-menu.show {
  display: block;
}

.mobile-dropdown-item {
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  color: var(--gray-700);
  transition: background 0.2s;
}

.mobile-dropdown-item:hover {
  background: var(--gray-50);
}

.mobile-dropdown-item.text-danger {
  color: var(--danger);
}

.mobile-dropdown-divider {
  height: 1px;
  background: var(--gray-200);
  margin: 0.5rem 0;
}
  </style>
</head>
<body>
  <div class="app">
    <!-- Mobile Header -->
<header class="header">
  <button class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>
  <div class="logo">
    <i class="fas fa-ticket-alt"></i>
    <span>VoucherFlow</span>
  </div>
<div class="mobile-user-dropdown">
  <div class="user-avatar" id="mobileAvatar" onclick="toggleMobileDropdown()">?</div>
  <div class="mobile-dropdown-menu" id="mobileDropdown">
    <div class="mobile-dropdown-item" onclick="showMobileProfile()">
      <i class="fas fa-user"></i> My Profile
    </div>
    <div class="mobile-dropdown-divider"></div>
    <div class="mobile-dropdown-item text-danger" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </div>
  </div>
</div>
</header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-ticket-alt"></i>
          <span>VoucherFlow</span>
        </div>
        <button class="close-btn" onclick="closeSidebar()">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="user-profile">
        <div class="user-info">
          <div class="user-avatar-large" id="sidebarAvatar">?</div>
          <div class="user-details">
            <div class="user-name" id="sidebarName">Loading...</div>
            <div class="user-email" id="sidebarEmail">-</div>
          </div>
        </div>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" onclick="loadSection('dashboard')" id="nav-dashboard">
          <i class="fas fa-chart-pie"></i> Dashboard
        </button>
        <button class="nav-item" onclick="loadSection('issue')" id="nav-issue">
          <i class="fas fa-plus-circle"></i> Issue Voucher
        </button>

    // ===== API CALL =====
    async function apiCall(endpoint, options = {}) {
      try {
        const res = await fetch(API_BASE + endpoint, {
          ...options,
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            ...options.headers
          }
        });
        
        if (res.status === 401) {
          showToast('Session expired', true);
          setTimeout(() => window.location.href = '/login.html', 2000);
          throw new Error('Unauthorized');
        }
        
        if (!res.ok) {
          const error = await res.text();
          throw new Error(error || `HTTP ${res.status}`);
        }
        
        return await res.json();
      } catch (err) {
        console.error('API Error:', err);
        throw err;
      }
    }

    function handleTemplateChange(e) {
      const select = e.target;
      const opt = select.options[select.selectedIndex];
      
      if (!select.value) {
        document.getElementById('issueTemplatePreview').classList.add('hidden');
        document.getElementById('issuePurchaseContainer').classList.add('hidden');
        selectedTemplate = null;
        return;
      }
      
      selectedTemplate = {
        id: select.value,
        type: opt.dataset.type,
        value: opt.dataset.value,
        min: parseFloat(opt.dataset.min)
      };
      
      const preview = document.getElementById('issueTemplatePreview');
      preview.innerHTML = `
        <div class="preview-title">Template Preview</div>
        <div><strong>${opt.text.split(' - ')[0]}</strong> · ${opt.dataset.type}</div>
        <div>Value: ${opt.dataset.type === 'fixed_amount' ? `KES ${opt.dataset.value}` : `${opt.dataset.value}%`}</div>
        ${opt.dataset.min > 0 ? `<div>Min purchase: KES ${opt.dataset.min}</div>` : ''}
      `;
      preview.classList.remove('hidden');
      
      if (opt.dataset.type === 'percentage') {
        document.getElementById('issuePurchaseContainer').classList.remove('hidden');

        document.getElementById('issuePurchaseContainer').classList.add('hidden');
      }

    function handleSearch(e) {
      const query = e.target.value.toLowerCase().trim();
      const results = document.getElementById('issueSearchResults');
      
      if (query.length < 2) {

        const name = `${u.first_name || ''} ${u.last_name || ''}`.toLowerCase();

      }).slice(0, 5);

        results.innerHTML = filtered.map(u => {
          const name = `${u.first_name || ''} ${u.last_name || ''}`.trim() || 'Unknown';

    async function issueVoucher() {
      if (!selectedTemplate) {
        showToast('Please select a template', true);
        return;
      }
      
      if (!selectedBeneficiary) {
        showToast('Please select a beneficiary', true);
        return;
      }
      
      const btn = document.getElementById('issueSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Issuing...';
      
      try {
        const data = {
          voucher_template_id: selectedTemplate.id,
          tenant_id: currentUser.tenant_id,
          beneficiary_name: selectedBeneficiary.name,
          beneficiary_email: selectedBeneficiary.email || null,
          expires_at: document.getElementById('issueExpiry').value || null
        };
        
        if (selectedTemplate.type === 'fixed_amount') {
          data.original_value = parseFloat(selectedTemplate.value);
        } else {
          const amount = parseFloat(document.getElementById('issuePurchaseAmount').value);
          if (!amount || amount < selectedTemplate.min) {
            showToast(`Minimum purchase KES ${selectedTemplate.min} required`, true);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Issue Voucher';
            return;
          }
          data.original_value = (amount * parseFloat(selectedTemplate.value)) / 100;
        }
        
        const res = await apiCall('/vouchers', { method: 'POST', body: JSON.stringify(data) });
        const result = res.data || res;

    async function redeemVoucher() {
      if (!currentVoucher || currentVoucher.status !== 'active') {
        showToast('Voucher not available', true);
        return;
      }
      
      const merchantId = document.getElementById('redeemMerchant').value;
      const amount = parseFloat(document.getElementById('redeemAmount').value);
      
      if (!merchantId || !amount) {
        showToast('Please fill all fields', true);
        return;
      }
      
      if (amount > currentVoucher.remaining_value) {
        showToast('Amount exceeds remaining value', true);
        return;
      }
      
      const btn = document.getElementById('redeemBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redeeming...';
      
      try {
        await apiCall('/redemptions', {
          method: 'POST',
          body: JSON.stringify({
            voucher_id: currentVoucher.id,
            merchant_id: merchantId,
            amount_redeemed: amount
          })
        });
        
        const result = document.getElementById('redeemResult');
        result.className = 'result-summary success';
        result.innerHTML = '<strong>Redeemed successfully!</strong>';
        result.classList.remove('hidden');
        
        document.getElementById('redeemCode').value = '';
        document.getElementById('redeemVoucherDetails').classList.add('hidden');
        document.getElementById('redeemAmount').value = '';
        currentVoucher = null;
        
        setTimeout(() => result.classList.add('hidden'), 3000);
        
      } catch (err) {
        showToast('Redemption failed', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Redeem';
      }
    }

window.useTemplate = (id) => {
  loadSection('issue');
  // Need to wait for issue section to load before setting template
  const checkInterval = setInterval(() => {
    const templateSelect = document.getElementById('issueTemplate');
    if (templateSelect) {
      templateSelect.value = id;
      templateSelect.dispatchEvent(new Event('change'));
      clearInterval(checkInterval);
    }
  }, 100);
  
  // Clear after 3 seconds to prevent infinite loop
  setTimeout(() => clearInterval(checkInterval), 3000);
};

    window.downloadUserTemplate = () => {
      const csv = 'first_name,last_name,email,phone,role\nJohn,Doe,john@example.com,0712345678,user\nJane,Smith,jane@example.com,0798765432,admin';
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });

      e.preventDefault();
      const file = e.dataTransfer.files[0];

      const file = input.files[0];
      if (file) processUserFile(file);
    };

    function processUserFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        const lines = content.split('\n').filter(l => l.trim());
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        
        const required = ['first_name', 'last_name', 'email'];
        const missing = required.filter(r => !headers.includes(r));
        if (missing.length) {
          showToast(`Missing columns: ${missing.join(', ')}`, true);
          return;
        }
        
        const data = lines.slice(1).map(l => {
          const values = l.split(',').map(v => v.trim());
          return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
        }).filter(row => row.first_name && row.last_name && row.email);
        
        const preview = document.getElementById('userImportPreview');
        preview.innerHTML = `
          <div class="preview-title">Preview (first 5 rows)</div>
          ${data.slice(0, 5).map(row => `
            <div>${row.first_name} ${row.last_name} - ${row.email}</div>
          `).join('')}
          <div class="list-meta">Total: ${data.length} users</div>
        `;
        preview.classList.remove('hidden');
        
        importFileData = { type: 'users', data };
        showToast(`Loaded ${data.length} users`);
      };
      reader.readAsText(file, 'UTF-8');
    }

    window.processUserImport = async () => {
      if (!importFileData || importFileData.type !== 'users') {
        showToast('No user file loaded', true);
        return;
      }
      
      let success = 0, failed = 0;
      const errors = [];
      
      for (const row of importFileData.data) {
        try {
          const userData = {
            tenant_id: currentUser.tenant_id,
            first_name: row.first_name,
            last_name: row.last_name,
            email: row.email,
            phone: row.phone || '',
            role: row.role || document.getElementById('bulkUserRole').value,
            status: 'active'
          };
          await apiCall('/users', { method: 'POST', body: JSON.stringify(userData) });
          success++;
        } catch (err) {
          failed++;
          errors.push(err.message);
        }
      }
      
      const result = document.getElementById('userImportResult');
      result.className = `result-summary ${failed ? 'warning' : 'success'}`;
      result.innerHTML = `<strong>Import Complete</strong><br>Success: ${success}<br>Failed: ${failed}`;
      if (errors.length) result.innerHTML += `<br><small>${errors.slice(0, 3).join('<br>')}</small>`;
      result.classList.remove('hidden');
      
      if (success > 0) loadUsersList();
    };

    window.processVoucherBulk = async () => {
      const templateId = document.getElementById('bulkVoucherTemplate').value;
      if (!templateId) {
        showToast('Select a template', true);
        return;
      }
      
      if (!importFileData || importFileData.type !== 'vouchers') {
        showToast('No file loaded', true);
        return;
      }
      
      // Get template details
      let template;
      try {
        const templateData = await apiCall(`/voucher_templates/${templateId}`);
        template = templateData.data || templateData;
      } catch (err) {
        showToast('Failed to load template details', true);

      const defaultExpiry = parseInt(document.getElementById('bulkVoucherExpiry').value) || 30;
      let success = 0, failed = 0;
      const errors = [];
      const created = [];
      
      for (const row of importFileData.data) {

          let expiry = row.expiry_date;
          if (!expiry && defaultExpiry) {
            const d = new Date();
            d.setDate(d.getDate() + defaultExpiry);

            original_value: parseFloat(template.value_amount)
          };

          success++;

    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  `;
  
  modal.innerHTML = `
    <div style="background: white; border-radius: var(--radius-lg); padding: 1.5rem; max-width: 400px; width: 90%;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; margin: 0 auto 1rem;">
          <i class="fas fa-sign-out-alt"></i>
        </div>
        <h3 class="card-title" style="font-size: 1.25rem;">Confirm Logout</h3>
        <p style="color: var(--gray-600); margin-top: 0.5rem;">Are you sure you want to logout?</p>
      </div>
      <div style="display: flex; gap: 0.75rem;">
        <button class="btn btn-outline" style="flex: 1;" onclick="this.closest('.modal-overlay').remove()">
          Cancel
        </button>
        <button class="btn btn-danger" style="flex: 1;" onclick="confirmLogout()">
          Logout
        </button>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  // Close modal when clicking outside
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.remove();
  });
};

// ===== CONFIRM LOGOUT =====
window.confirmLogout = () => {
  // Remove the modal
  document.querySelector('.modal-overlay')?.remove();
  
  // Show toast
  showToast('Logging out...');
  
  // Clear token and redirect
  setTimeout(() => {
    localStorage.removeItem('token');
    window.location.href = '/';
  }, 500);
};
    // ===== INITIAL LOAD =====
    loadSection('dashboard');
  </script>
</body>
</html>
